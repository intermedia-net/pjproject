name: Android release

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch name to checkout and build (e.g. release/1.2.3-4)"
        required: true
        type: string
      tag:
        description: "Tag name to id the GitHub release (e.g. 1.2.3-4)"
        required: true
        type: string

env:
  RELEASE_ARCHIVE_NAME: android-release
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container: 
      image: ghcr.io/intermedia-net/pjproject-android-builder:master
      volumes:
        - ${{ github.workspace }}/input:/home/tools/pjproject 
        - ${{ github.workspace }}/output:/home/output/pjsip-build-output
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          path: input

      - name: Print version.mak
        shell: bash
        run: |
          echo "=== version.mak ==="
          cat input/version.mak

      - name: Build library
        run: |
          mkdir -p output
          cd /home
          ./build
          
      - name: Create asset
        if: always()
        run: |
          tar -czvf "$RELEASE_ARCHIVE_NAME".tar.gz -C output .

      - name: Publish release
        if: always()
        id: update_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          artifacts: ${{ env.RELEASE_ARCHIVE_NAME }}.tar.gz
          allowUpdates: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true